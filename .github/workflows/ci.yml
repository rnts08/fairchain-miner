name: CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Run go fmt
        run: test -z $(go fmt ./...)

      - name: Run go vet
        run: go vet ./...

      - name: Run unit tests
        run: go test -v ./pkg/... -race -coverprofile=coverage.txt -covermode=atomic

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.txt
          fail_ci_if_error: false

  build:
    name: Cross Compile
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -v -o bin/fairchain-miner-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/fairchain-miner

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fairchain-miner-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/fairchain-miner-${{ matrix.goos }}-${{ matrix.goarch }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Run Gosec Security Scanner
        uses: securecodewarrior/gosec-action@v3
        with:
          args: "-exclude-dir=testdata ./..."

  benchmarks:
    name: Benchmark
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run benchmarks
        run: go test ./pkg/algorithm -bench=BenchmarkPoWHash -benchmem -count=3